---
- name: Install Java 21
  apt:
    name: openjdk-21-jdk
    state: present

- name: Create app directory
  file:
    path: /opt/burgerbuilder
    state: directory
    owner: azureuser
    group: azureuser
    mode: '0755'

- name: Copy backend JAR
  copy:
    src: "{{ backend_jar_path }}"
    dest: /opt/burgerbuilder/app.jar
    owner: azureuser
    group: azureuser
    mode: '0644'

- name: Copy systemd service file
  template:
    src: burgerbuilder.service.j2
    dest: /etc/systemd/system/burgerbuilder.service
    owner: root
    group: root
    mode: '0644'
  notify: restart burgerbuilder

- name: Create environment file
  copy:
    dest: /opt/burgerbuilder/.env
    owner: azureuser
    group: azureuser
    mode: '0600'
    content: |
      SPRING_PROFILES_ACTIVE=azure
      DB_HOST={{ db_host }}
      DB_PORT=1433
      DB_NAME={{ db_name }}
      DB_USERNAME={{ db_username }}
      DB_PASSWORD={{ db_password }}

- name: Enable and start backend service
  systemd:
    name: burgerbuilder
    enabled: yes
    state: started
    daemon_reload: yes