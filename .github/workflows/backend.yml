name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: backend
        run: mvn test

      - name: Build JAR
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/burgerbuilder
          chmod 600 ~/.ssh/burgerbuilder
          ssh-keyscan -H 20.13.155.82 >> ~/.ssh/known_hosts
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/burgerbuilder

      - name: Install Ansible
        run: pip install ansible

      - name: Deploy to backend VM via Ansible
        run: |
          ansible-playbook config/ansible/site.yml \
            -i config/ansible/inventories/dev/hosts.yml \
            --limit backend \
            --private-key ~/.ssh/burgerbuilder \
            --extra-vars "backend_jar_path=${{ github.workspace }}/backend/target/burger-builder-backend-1.0.0.jar db_host=sql-burgerbuilder-group7.database.windows.net db_name=burgerbuilderdbgroup7 db_username=sqladmingroup7 db_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -u azureuser