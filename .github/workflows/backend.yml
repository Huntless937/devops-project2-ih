name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: backend
        run: mvn test

      - name: SonarQube Scan
        working-directory: backend
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=burger-backend \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN_BACKEND }}

      - name: Build JAR
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/burgerbuilder
          chmod 600 ~/.ssh/burgerbuilder
          ssh-keyscan -H ${{ secrets.SONAR_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Configure SSH ProxyJump
        run: |
          cat >> ~/.ssh/config << EOF
          Host sonarqube
            HostName ${{ secrets.SONAR_PUBLIC_IP }}
            User azureuser
            IdentityFile ~/.ssh/burgerbuilder
            StrictHostKeyChecking no

          Host 10.0.*
            User azureuser
            ProxyJump sonarqube
            IdentityFile ~/.ssh/burgerbuilder
            StrictHostKeyChecking no
          EOF

      - name: Install Ansible
        run: pip install ansible

      - name: Deploy to backend VM via Ansible
        run: |
          ansible-playbook config/ansible/site.yml \
            -i config/ansible/inventories/dev/hosts.yml \
            --limit backend \
            --private-key ~/.ssh/burgerbuilder \
            --extra-vars "backend_jar_path=${{ github.workspace }}/backend/target/burger-builder-backend-1.0.0.jar db_host=sql-burgerbuilder-group7.database.windows.net db_name=burgerbuilderdbgroup7 db_username=sqladmingroup7 db_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -u azureuser
