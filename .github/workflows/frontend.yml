name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://${{ secrets.APPGW_PUBLIC_IP }}/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Deploy to frontend VM via Ansible
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: config/ansible/site.yml
          inventory: config/ansible/inventories/dev/hosts.yml
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            --limit frontend
            --extra-vars "frontend_build_path=frontend/dist/"