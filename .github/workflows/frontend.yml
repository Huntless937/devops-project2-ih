name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://${{ secrets.APPGW_PUBLIC_IP }}/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/burgerbuilder
          chmod 600 ~/.ssh/burgerbuilder
          ssh-keyscan -H 20.13.160.191 >> ~/.ssh/known_hosts
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/burgerbuilder

      - name: Install Ansible
        run: pip install ansible

      - name: Deploy to frontend VM via Ansible
        run: |
          ansible-playbook config/ansible/site.yml \
            -i config/ansible/inventories/dev/hosts.yml \
            --limit frontend \
            --private-key ~/.ssh/burgerbuilder \
            --extra-vars "frontend_build_path=${{ github.workspace }}/frontend/dist/" \
            -u azureuser