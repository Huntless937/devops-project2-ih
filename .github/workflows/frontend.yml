name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    name: Build and Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test -- --run

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://40.67.225.150.nip.io

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/burgerbuilder
          chmod 600 ~/.ssh/burgerbuilder
          ssh-keyscan -H ${{ secrets.SONAR_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Configure SSH ProxyJump
        run: |
          cat >> ~/.ssh/config << EOF
          Host sonarqube
            HostName ${{ secrets.SONAR_PUBLIC_IP }}
            User azureuser
            IdentityFile ~/.ssh/burgerbuilder
            StrictHostKeyChecking no

          Host 10.0.*
            User azureuser
            ProxyJump sonarqube
            IdentityFile ~/.ssh/burgerbuilder
            StrictHostKeyChecking no
          EOF

      - name: Install Ansible
        run: pip install ansible

      - name: Deploy to frontend VM via Ansible
        run: |
          ansible-playbook config/ansible/site.yml \
            -i config/ansible/inventories/dev/hosts.yml \
            --limit frontend \
            --private-key ~/.ssh/burgerbuilder \
            --extra-vars "frontend_build_path=${{ github.workspace }}/frontend/dist/" \
            -u azureuser
